default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '\.csv$'
      - id: check-yaml
      - id: check-added-large-files
        exclude: 'uv\.lock|^data/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.19
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/srstevenson/nb-clean
    rev: 4.0.1
    hooks:
      - id: nb-clean
        args:
          - --preserve-cell-metadata
          - nbsphinx
          - tags
          - --

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright --project pyrightconfig.json
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]
      - id: pyrefly
        name: pyrefly
        entry: uv run pyrefly check python/pdstools --count-errors=0
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

