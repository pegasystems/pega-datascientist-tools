name: Build & Deploy docs

on:
  push:
    tags:
      - "V*"
      - "v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build from (for example V4.7.1 to backfill an older tag)"
        required: false
        type: string
      publish_slug:
        description: "Published docs slug to write under gh-pages (defaults to the normalized tag name or dev)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy docs
    steps:
      - name: Resolve docs version slug
        id: version
        run: |
          source_ref="${{ github.event.inputs.source_ref }}"
          publish_slug="${{ github.event.inputs.publish_slug }}"

          if [ -n "${publish_slug}" ]; then
            slug="${publish_slug}"
          elif [ -n "${source_ref}" ]; then
            slug="${source_ref#V}"
            slug="${slug#v}"
            if [ "${slug}" = "master" ] || [ "${slug}" = "main" ]; then
              slug="dev"
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            slug="${GITHUB_REF_NAME#V}"
            slug="${slug#v}"
          else
            slug="dev"
          fi

          if [ -n "${source_ref}" ]; then
            checkout_ref="${source_ref}"
          else
            checkout_ref="${GITHUB_REF_NAME}"
          fi

          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "Building docs as: ${slug}"
          echo "Checking out ref: ${checkout_ref}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Prepare build tree
        id: build_tree
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
          CHECKOUT_REF: ${{ steps.version.outputs.checkout_ref }}
        run: |
          build_root="."
          if [ -n "${SOURCE_REF}" ]; then
            python3 python/docs/prepare_versioned_docs_source.py \
              --source-ref "${CHECKOUT_REF}" \
              --output-dir build-source
            build_root="build-source"
          fi
          echo "build_root=${build_root}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.11

      - name: Install the project
        run: uv sync --project "${{ steps.build_tree.outputs.build_root }}" --extra docs --extra all

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc graphviz

      - name: Build Python documentation
        working-directory: ${{ steps.build_tree.outputs.build_root }}/python/docs
        env:
          PDSTOOLS_DOCS_VERSION: ${{ steps.version.outputs.slug }}
          SPHINXOPTS: -W --keep-going
        run: |
          mkdir -p /tmp/jupyter_config
          echo "c.KernelManager.transport = 'ipc'" > /tmp/jupyter_config/jupyter_kernel_config.py
          JUPYTER_CONFIG_DIR=/tmp/jupyter_config make html

      - name: Stage published tree
        env:
          SLUG: ${{ steps.version.outputs.slug }}
          BUILD_ROOT: ${{ steps.build_tree.outputs.build_root }}
        run: |
          set -euo pipefail
          mkdir -p "public/${SLUG}"
          cp -r "${BUILD_ROOT}/python/docs/build/html/." "public/${SLUG}/"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: true
          commit_message: "docs: deploy ${{ steps.version.outputs.slug }} from ${{ steps.version.outputs.checkout_ref }} (${{ github.sha }})"

  refresh-manifest:
    name: Refresh versions.json
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Regenerate versions manifest and redirect
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 repo/python/docs/versioned_docs.py \
            --site-root gh-pages \
            --base-url "https://${REPO_OWNER}.github.io/${REPO_NAME}" \
            --package-name pdstools

      - name: Commit and push manifest
        working-directory: gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          if git diff --cached --quiet; then
            echo "versions manifest unchanged."
          else
            git commit -m "docs: refresh versions manifest"
            git push
          fi
