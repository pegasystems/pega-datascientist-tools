name: Dependabot auto-merge

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  retroactive:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Enable auto-merge for all open Dependabot PRs
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --author 'dependabot[bot]' --state open --json url --jq '.[].url' | while read -r pr_url; do
            echo "Enabling auto-merge for $pr_url"
            gh pr merge --auto --squash "$pr_url" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
