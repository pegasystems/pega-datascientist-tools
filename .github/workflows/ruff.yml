name: Python quality
permissions:
  contents: read

on:
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - python/**
      - pyproject.toml
      - .pre-commit-config.yaml
      - .github/workflows/**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - python/**
      - pyproject.toml
      - .pre-commit-config.yaml
      - .github/workflows/**

jobs:
  pre-commit:
    name: pre-commit (Python 3.12)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/.pre-commit-config.yaml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install the project with typing dependencies
        run: uv sync --extra all --extra dev --extra tests

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  mypy:
    name: mypy (Python 3.12)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/.pre-commit-config.yaml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install the project with dev tooling
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy --config-file pyproject.toml python/pdstools
